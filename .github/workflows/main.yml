name: Keep Render Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -sSf --connect-timeout 10 --max-time 30 https://YOUR-BACKEND-URL.onrender.com/health || echo "Ping failed, backend may be cold-starting"
